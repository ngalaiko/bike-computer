included:
  - Voop

excluded:
  # Generated by `mise run bindgen` — not ours to lint or format.
  - Voop/Generated

disabled_rules:
  - trailing_whitespace
  # Owned by SwiftFormat (see `mise run format`), which *adds* trailing commas to multiline
  # collections — the opposite of this rule. Keeping it on makes the two tools fight.
  - trailing_comma

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - empty_collection_literal
  - empty_string
  - explicit_init
  - first_where
  - flatmap_over_map_reduce
  - last_where
  - legacy_multiple
  # modifier_order intentionally omitted: SwiftFormat owns modifier ordering, and it leaves the
  # codebase's `private nonisolated(unsafe)` order alone, which this rule would flag.
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

identifier_name:
  min_length:
    warning: 1
  excluded:
    - i
    - j
    - x
    - y
    - z
    - id
    - dt
    - c1
    - c2
    - p

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 300

file_length:
  warning: 400
