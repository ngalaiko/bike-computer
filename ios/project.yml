name: Voop
options:
  bundleIdPrefix: com.galaiko
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
  xcodeVersion: "16.4"

settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_STRICT_CONCURRENCY: complete
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Voop:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Voop
    attributes:
      DevelopmentTeam: 5S3AM79MK3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.galaiko.voop
        DEVELOPMENT_TEAM: 5S3AM79MK3
        INFOPLIST_FILE: Voop/App/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - framework: VoopProtocol.xcframework
        embed: false
      - target: VoopWidget

  VoopWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: VoopWidget
      - path: Voop/Shared/RideActivityAttributes.swift
    attributes:
      DevelopmentTeam: 5S3AM79MK3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.galaiko.voop.widget
        DEVELOPMENT_TEAM: 5S3AM79MK3
        INFOPLIST_FILE: VoopWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
