[tools]
swiftlint = "0.63.3"
swiftformat = "0.61.1"
"gem:xcpretty" = "latest"
"gem:xcodeproj" = "1.27.0"

[env]
GEM_PATH = "{{env.HOME}}/.local/share/mise/installs/gem-xcodeproj/1.27.0/libexec"

[tasks.build]
description = "Build the app for iPhone 17 simulator"
depends = [":setup-protocol"]
run = """
xcodebuild \
  -project Voop.xcodeproj \
  -scheme Voop \
  -destination 'platform=iOS Simulator,name=iPhone 17' \
  -derivedDataPath .build \
  build \
  | xcpretty
"""

[tasks.run]
description = "Launch the app in the iPhone 17 simulator"
depends = [":build"]
run = """
xcrun simctl boot "iPhone 17" 2>/dev/null || true
open -a Simulator
xcrun simctl bootstatus "iPhone 17" -b
xcrun simctl install "iPhone 17" .build/Build/Products/Debug-iphonesimulator/Voop.app
xcrun simctl launch --console "iPhone 17" com.galaiko.voop
"""

[tasks.bindgen]
description = "Generate Swift bindings and C headers from the macOS dylib"
depends = ["//protocol-ffi:build"]
sources = ["../target/release/libvoop_protocol.dylib"]
outputs = ["Voop/Generated/voop_protocol.swift", "Voop/Generated/voop_protocolFFI.h"]
run = """
mkdir -p Voop/Generated
cargo run -p voop-protocol-ffi --features uniffi-cli --bin uniffi-bindgen -- \
  generate \
  --library ../target/release/libvoop_protocol.dylib \
  --language swift \
  --out-dir Voop/Generated/
"""

[tasks.xcframework]
description = "Bundle device + simulator staticlibs into an XCFramework"
depends = [":bindgen"]
sources = [
  "../target/aarch64-apple-ios/release/libvoop_protocol.a",
  "../target/aarch64-apple-ios-sim/release/libvoop_protocol.a",
  "Voop/Generated/voop_protocolFFI.h",
]
outputs = ["VoopProtocol.xcframework/Info.plist"]
run = """
mkdir -p xcframework-headers
cp Voop/Generated/voop_protocolFFI.h xcframework-headers/
cp Voop/Generated/voop_protocolFFI.modulemap xcframework-headers/module.modulemap

rm -rf VoopProtocol.xcframework
xcodebuild -create-xcframework \
  -library ../target/aarch64-apple-ios/release/libvoop_protocol.a \
  -headers xcframework-headers/ \
  -library ../target/aarch64-apple-ios-sim/release/libvoop_protocol.a \
  -headers xcframework-headers/ \
  -output VoopProtocol.xcframework
rm -rf xcframework-headers
"""

[tasks.setup-protocol]
description = "Wire VoopProtocol.xcframework and VoopProtocol.swift into Voop.xcodeproj (idempotent)"
depends = [":xcframework"]
run = "ruby scripts/setup_protocol.rb"

[tasks.lint]
description = "Lint Swift sources with SwiftLint"
run = "swiftlint lint --strict Voop"

[tasks.format]
description = "Format Swift sources with SwiftFormat"
run = "swiftformat Voop"
