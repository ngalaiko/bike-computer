[tasks.build-ios]
description = "Compile voop-protocol as staticlib for iOS device and simulator"
dir = "{{config_root}}/.."
run = """
cargo rustc -p voop-protocol --release --target aarch64-apple-ios --features uniffi -- --crate-type staticlib
cargo rustc -p voop-protocol --release --target aarch64-apple-ios-sim --features uniffi -- --crate-type staticlib
"""

[tasks.bindgen]
description = "Generate Swift bindings from the compiled iOS staticlib"
dir = "{{config_root}}/.."
depends = ["build-ios"]
run = """
mkdir -p protocol/generated
cargo run -p voop-protocol --features uniffi-cli --bin uniffi-bindgen -- \
  generate \
  --library target/aarch64-apple-ios/release/libvoop_protocol.a \
  --language swift \
  --out-dir protocol/generated/
"""

[tasks.xcframework]
description = "Bundle device + simulator staticlibs into an XCFramework"
dir = "{{config_root}}/.."
depends = ["bindgen"]
run = """
mkdir -p protocol/generated/headers
cp protocol/generated/VoopProtocolFFI.h protocol/generated/headers/
cp protocol/generated/VoopProtocolFFI.modulemap protocol/generated/headers/module.modulemap

rm -rf ios/VoopProtocol.xcframework
xcodebuild -create-xcframework \
  -library target/aarch64-apple-ios/release/libvoop_protocol.a \
  -headers protocol/generated/headers/ \
  -library target/aarch64-apple-ios-sim/release/libvoop_protocol.a \
  -headers protocol/generated/headers/ \
  -output ios/VoopProtocol.xcframework
"""

